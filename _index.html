<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كيفا بلس - Kifa Plus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1E6091, #184D77);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .app-container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 28px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #1E6091;
            font-size: 42px;
            margin-bottom: 5px;
            text-align: center;
        }
        .subtitle {
            color: #FF6B4A;
            text-align: center;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .role-card {
            background: #F9F3E6;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid #ffe9ce;
        }
        .role-card:hover {
            border-color: #1E6091;
            transform: scale(1.02);
        }
        .role-emoji {
            font-size: 40px;
        }
        .role-info h3 {
            color: #1E6091;
            font-size: 20px;
            margin-bottom: 5px;
        }
        .role-info p {
            color: #666;
            font-size: 14px;
        }
        .btn-primary {
            background: #1E6091;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px;
            width: 100%;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
            transition: 0.2s;
        }
        .btn-secondary {
            background: white;
            color: #1E6091;
            border: 2px solid #1E6091;
            border-radius: 50px;
            padding: 14px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
        }
        .hidden {
            display: none;
        }
        .code-display {
            background: #F9F3E6;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin: 20px 0;
        }
        .code-number {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #1E6091;
            font-family: monospace;
        }
        .timer {
            color: #FF6B4A;
            font-weight: 600;
            margin-top: 10px;
        }
        .footer {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- شاشة الترحيب -->
        <div id="welcomeScreen">
            <h1>🍽️ Kifa Plus</h1>
            <div class="subtitle">نربط القلوب من خلال الوجبات</div>
            
            <div style="background: #F9F3E6; border-radius: 24px; padding: 20px; margin: 25px 0;">
                <p style="margin: 10px 0;"><span style="color: #1E6091; font-weight: bold;">❤️ متبرع:</span> تبرع بـ Pi</p>
                <p style="margin: 10px 0;"><span style="color: #1E6091; font-weight: bold;">🍽️ مستفيد:</span> اطلب وجبة واستلم كود</p>
                <p style="margin: 10px 0;"><span style="color: #1E6091; font-weight: bold;">🏪 مطعم:</span> جهز الوجبة وتحقق من الكود</p>
            </div>
            
            <button class="btn-primary" onclick="showLogin()">ابدأ</button>
        </div>

        <!-- شاشة تسجيل الدخول -->
        <div id="loginScreen" class="hidden">
            <h1>Kifa Plus</h1>
            <div style="text-align: center; margin: 30px 0;">
                <div style="font-size: 60px;">🔵</div>
                <p style="color: #666; margin: 20px 0;">سجل الدخول بحساب Pi للمتابعة</p>
            </div>
            <button class="btn-primary" onclick="login()">Continue with Pi</button>
            <button class="btn-secondary" onclick="goBack()">رجوع</button>
        </div>

        <!-- الشاشة الرئيسية -->
        <div id="mainScreen" class="hidden">
            <h1>Kifa Plus</h1>
            
            <div class="role-card" onclick="showRole('donor')">
                <div class="role-emoji">❤️</div>
                <div class="role-info">
                    <h3>متبرع</h3>
                    <p>تبرع بـ Pi</p>
                </div>
            </div>
            
            <div class="role-card" onclick="showRole('beneficiary')">
                <div class="role-emoji">🍽️</div>
                <div class="role-info">
                    <h3>مستفيد</h3>
                    <p>اطلب وجبة واستلم كود</p>
                </div>
            </div>
            
            <div class="role-card" onclick="showRole('restaurant')">
                <div class="role-emoji">🏪</div>
                <div class="role-info">
                    <h3>مطعم</h3>
                    <p>جهز الوجبة وتحقق من الكود</p>
                </div>
            </div>
            
            <div id="roleContent" class="hidden"></div>
            <button class="btn-secondary" onclick="goBackToMain()">العودة للرئيسية</button>
        </div>
    </div>

    <script>
        // عناصر الصفحة
        const welcomeScreen = document.getElementById('welcomeScreen');
        const loginScreen = document.getElementById('loginScreen');
        const mainScreen = document.getElementById('mainScreen');
        const roleContent = document.getElementById('roleContent');
        
        // دوال التنقل
        function showLogin() {
            welcomeScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
        }
        
        function goBack() {
            loginScreen.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
        }
        
        function login() {
            loginScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');
        }
        
        function goBackToMain() {
            roleContent.classList.add('hidden');
            roleContent.innerHTML = '';
        }
        
        // عرض المحتوى حسب الدور
        function showRole(role) {
            roleContent.classList.remove('hidden');
            
            if (role === 'donor') {
                roleContent.innerHTML = `
                    <div style="background: white; border-radius: 20px; padding: 20px; margin-top: 20px;">
                        <h3 style="color: #1E6091; margin-bottom: 15px;">💰 تبرع بـ Pi</h3>
                        <p style="margin-bottom: 15px;">وجبة واحدة: 2.5 Pi</p>
                        <button class="btn-primary" onclick="alert('تم إرسال طلب التبرع')">تبرع الآن</button>
                    </div>
                `;
            } else if (role === 'beneficiary') {
                let code = Math.floor(100000 + Math.random() * 900000);
                roleContent.innerHTML = `
                    <div class="code-display">
                        <h3 style="color: #1E6091; margin-bottom: 15px;">🍽️ كود الوجبة</h3>
                        <div class="code-number">${code}</div>
                        <div class="timer">⏳ صالح لمدة 3 ساعات</div>
                        <button class="btn-primary" style="margin-top: 20px;" onclick="generateNewCode()">طلب كود جديد</button>
                    </div>
                `;
            } else if (role === 'restaurant') {
                roleContent.innerHTML = `
                    <div style="background: white; border-radius: 20px; padding: 20px; margin-top: 20px;">
                        <h3 style="color: #1E6091; margin-bottom: 15px;">🔍 التحقق من الكود</h3>
                        <input type="text" id="codeInput" placeholder="أدخل الكود" style="width:100%; padding:15px; border:2px solid #eef2f6; border-radius:50px; margin-bottom:15px;">
                        <button class="btn-primary" onclick="validateCode()">تحقق</button>
                    </div>
                `;
            }
        }
        
        function generateNewCode() {
            let code = Math.floor(100000 + Math.random() * 900000);
            document.querySelector('.code-number').textContent = code;
        }
        
        function validateCode() {
            let code = document.getElementById('codeInput').value;
            if (code.length === 6) {
                alert('✅ كود صحيح! يمكن تجهيز الوجبة');
            } else {
                alert('❌ كود غير صحيح');
            }
        }
    </script>
</body>
</html>
